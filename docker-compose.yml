services:
  avtorgraf:
    build: .
    container_name: avtorgraf
    env_file:
      - .env
    ports:
      - "${APP_PORT:-8080}:8080"
    volumes:
      - avtorgraf-data:/app/data
      # При необходимости смонтируйте директорию с документами LightRAG:
      # - /root/lightrag/LightRAG/data/inputs/__enqueued__:/app/inputs:ro
    restart: unless-stopped

volumes:
  avtorgraf-data:
